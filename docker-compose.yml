services:
  frontend:
    image: ${FRONTEND_IMAGE:-sst-frontend-pj5t0g:latest}
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-https://api.dh2o.com.co/api/v1}
      - REACT_APP_FRONTEND_URL=${REACT_APP_FRONTEND_URL:-https://sst.dh2o.com.co}
      - REACT_APP_ENVIRONMENT=${REACT_APP_ENVIRONMENT:-production}
      - REACT_APP_ENABLE_DEBUG=${REACT_APP_ENABLE_DEBUG:-false}
      - REACT_APP_ENABLE_LOGGING=${REACT_APP_ENABLE_LOGGING:-false}
    expose:
      - "3000"
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN:-sst.dh2o.com.co}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true
